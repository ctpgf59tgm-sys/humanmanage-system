<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>成绩列表</title>
    <link rel="stylesheet" th:href="@{/css/element-ui.css}">
    <script type="text/javascript" th:src="@{/js/vue.min.js}"></script>
    <script type="text/javascript" th:src="@{/js/element-ui.js}"></script>
    <script type="text/javascript" th:src="@{/js/axios.min.js}"></script>
    <style>
        .el-table, .el-table__expanded-cell{
            background-color: transparent;
        }
        .el-table th,
        .el-table tr,
        .el-table td {
            background-color: transparent;
        }
    </style>
</head>
<body>
<div id="app">
    <center>
        <el-form :inline="true" class="demo-form-inline">
            <el-form-item label="姓名">
                <el-input v-model="searchScore.name" placeholder="请输入姓名"></el-input>
            </el-form-item>
            <el-form-item label="班级">
                <el-input v-model="searchScore.classId" placeholder="请输入班级"></el-input>
            </el-form-item>
            <el-form-item>
                <el-button type="success" round @click="search()">查询</el-button>
                <el-button type="primary" round @click="openAddDrawer()">添加</el-button>
            </el-form-item>
        </el-form>
    </center>
    <template>
        <el-table
                :data="tableData"
                border
                style="width: 100%">
            <el-table-column
                    fixed
                    label="序号"
                    type="index"
                    align="center"
                    width="80">
            </el-table-column>
            <el-table-column
                    prop="name"
                    label="姓名"
                    align="center"
                    width="130">
            </el-table-column>
            <el-table-column
                    prop="id"
                    label="学号"
                    align="center"
                    width="150">
            </el-table-column>
            <el-table-column
                    prop="classId"
                    label="班级"
                    align="center"
                    width="130">
            </el-table-column>
            <el-table-column
                    label="排名"
                    align="center"
                    width="100">
                <template slot-scope="scope">
                    {{ scope.row.rank || '-' }}
                </template>
            </el-table-column>
            <el-table-column
                    prop="chinese"
                    label="语文"
                    align="center"
                    width="100">
            </el-table-column>
            <el-table-column
                    prop="math"
                    label="数学"
                    align="center"
                    width="100">
            </el-table-column>
            <el-table-column
                    prop="english"
                    label="英语"
                    align="center"
                    width="100">
            </el-table-column>
            <el-table-column
                    label="总成绩"
                    align="center"
                    width="120">
                <template slot-scope="scope">
                    {{ (Number(scope.row.chinese) || 0) + (Number(scope.row.math) || 0) + (Number(scope.row.english) || 0) }}
                </template>
            </el-table-column>
            <el-table-column
                    fixed="right"
                    label="操作"
                    align="center"
                    width="200">
                <template slot-scope="scope">
                    <el-popconfirm
                            confirm-button-text='好的'
                            cancel-button-text='不用了'
                            @confirm="deleteScore(scope.row.id)"
                            icon="el-icon-info"
                            icon-color="red"
                            :title=title
                    >
                        <el-button slot="reference" @click="setTitle(scope.row.name)" type="danger" icon="el-icon-delete" plain circle></el-button>
                    </el-popconfirm>

                    <el-button type="primary" @click="openDrawer(scope.row)" icon="el-icon-edit-outline" plain circle></el-button>
                </template>
            </el-table-column>
        </el-table>
        <el-drawer
                title="修改成绩信息"
                :visible.sync="drawer"
                :with-header="true">
            <span>
                <el-form ref="form" :model="form" label-width="80px">
                    <el-form-item label="学号">
                        <el-input v-model="form.id" disabled></el-input>
                    </el-form-item>
                    <el-form-item label="姓名">
                        <el-input v-model="form.name"></el-input>
                    </el-form-item>
                    <el-form-item label="班级">
                        <el-input v-model="form.classId"></el-input>
                    </el-form-item>
                    <el-form-item label="语文">
                        <el-input v-model="form.chinese"></el-input>
                    </el-form-item>
                    <el-form-item label="数学">
                        <el-input v-model="form.math"></el-input>
                    </el-form-item>
                    <el-form-item label="英语">
                        <el-input v-model="form.english"></el-input>
                    </el-form-item>
                    <el-form-item>
                        <el-button type="primary" @click="updateScore()">修改</el-button>
                        <el-button>取消</el-button>
                    </el-form-item>
                </el-form>
            </span>
        </el-drawer>
        <el-drawer title="新增成绩" :visible.sync="addDrawer" :with-header="true">
            <el-form ref="addForm" :model="addForm" label-width="80px">
                <el-form-item label="姓名：">
                    <el-input v-model="addForm.name"></el-input>
                </el-form-item>
                <el-form-item label="班级：">
                    <el-input v-model="addForm.classId"></el-input>
                </el-form-item>
                <el-form-item label="语文：">
                    <el-input v-model="addForm.chinese"></el-input>
                </el-form-item>
                <el-form-item label="数学：">
                    <el-input v-model="addForm.math"></el-input>
                </el-form-item>
                <el-form-item label="英语：">
                    <el-input v-model="addForm.english"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" @click="addScore()">确认新增</el-button>
                    <el-button @click="addDrawer = false">取消</el-button>
                </el-form-item>
            </el-form>
        </el-drawer>
    </template>
</div>
<script>
    new Vue({
        el:"#app",
        data(){
            return{
                tableData: [],
                addDrawer:false,
                addForm:{},
                searchScore:{
                    name:"",
                    classId:"",
                },
                title:"",
                drawer:false,
                form: {
                    id: '',
                    name: '',
                    classId: '',
                    chinese: '',
                    math: '',
                    english: ''
                }
            }
        },
        methods:{
            loadData() {
                axios({
                    url: "/api/score/getScore",
                    method: "GET",
                    headers: {"Content-Type": "application/json"},
                    params: {
                        name: this.searchScore.name,
                        id: ''
                    }
                }).then(response=>{
                    let data = response.data.data

                    data.forEach(item => {
                        item.totalScore = (Number(item.chinese) || 0) + (Number(item.math) || 0) + (Number(item.english) || 0)
                    })

                    data.sort((a, b) => b.totalScore - a.totalScore)

                    data.forEach((item, index) => {
                        if (index === 0) {
                            item.rank = 1
                        } else if (item.totalScore === data[index - 1].totalScore) {
                            item.rank = data[index - 1].rank
                        } else {
                            item.rank = index + 1
                        }
                    })
                    
                    this.tableData = data
                }).catch(error=>{
                    this.$message.error("服务器错误,请重试！")
                })
            },
            search(){
                this.loadData();
            },
            setTitle(name){
                this.title = "你确定要删除【"+name+"】的成绩吗？"
            },
            deleteScore(id){
                axios({
                    url:"/api/score/delete",
                    method: "POST",
                    headers:{"Content-Type":"application/json"},
                    params: {
                        id: id,
                    }
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        this.loadData()
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器错误，请稍后重试！");
                })
            },
            openDrawer(score){
                this.form = JSON.parse(JSON.stringify(score))
                this.drawer = true
            },
            updateScore(){
                axios({
                    url:"/api/score/update",
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    data:JSON.stringify(this.form),
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        this.drawer = false
                        this.loadData()
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器错误，请稍后重试！");
                })
            },
            openAddDrawer(){
                this.addForm = {}
                this.addDrawer = true
            },
            addScore(){
                axios({
                    url:"/api/score/add",
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    data:JSON.stringify(this.addForm)
                }).then(response=>{
                    if (response.data.code === 200){
                        this.$message.success(response.data.message)
                        this.addDrawer = false
                        this.loadData()
                    }else{
                        this.$message.error(response.data.message)
                    }
                }).catch(error=>{
                    this.$message.error("服务器新增失败，请稍后重试！");
                })
            }
        },
        mounted() {
            this.loadData()
        }
    })
</script>
</body>
</html>
